# Hardening applied Session 68 after SSH storm from Claude Code connection bursts
# Rationale documented in repo docs/SSH_HARDENING.md

# Allow more concurrent pre-auth connections (default 10:30:100 too low for
# multi-tool workflows where Claude Code + VS Code + terminal can all hit at once)
MaxStartups 60:30:200

# Allow more channels per connection (default 10)
MaxSessions 20

# Shorter keepalive so dead clients drop fast, preventing zombie accumulation
ClientAliveInterval 60
ClientAliveCountMax 3

# Shorter login grace — kill half-completed auths faster
LoginGraceTime 30

# TCP keepalive at kernel level
TCPKeepAlive yes
