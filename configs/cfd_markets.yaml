# US Equity Indices
# ============================================================================

ES:
  full_name: "E-mini S&P 500 (SP500 CFD)"
  source: dukascopy
  tds_symbol: "USA_500_Index"
  data_files:
    5m: "ES_5m_dukascopy.csv"
    15m: "ES_15m_dukascopy.csv"
    30m: "ES_30m_dukascopy.csv"
    60m: "ES_60m_dukascopy.csv"
    daily: "ES_daily_dukascopy.csv"
  engine:
    tick_value: 0.01
    dollars_per_point: 1.0
    commission_per_contract: 0
    slippage_ticks: 1
  cost_profile:
    spread_pts: 0.50
