# CFD Market Configuration — All 24 Dukascopy Markets
#
# Used by: run_local_sweep.py, run_cluster_sweep.py, generate_sweep_configs.py
#
# Key decisions:
#   - slippage_ticks: 0 and commission: 0 for CFD sweeps (costs applied in portfolio selector)
#   - oos_split_date: 2020-01-01 for indices (2012+ start), 2016-01-01 for FX/metals (2008+ start)
#   - dollars_per_point: set per CFD contract, not futures contract
#   - cost_profile: typical retail CFD spreads for post-sweep filtering

