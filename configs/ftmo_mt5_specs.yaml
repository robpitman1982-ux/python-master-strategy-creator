# FTMO MT5 Per-Symbol Cost Overlay (DRAFT)
# =====================================================================
# Public data only. Per-symbol spread/swap/commission/contract specs
# require an MT5 Free Trial connection (Ctrl+M -> right-click ->
# Specification) to populate. All numeric per-symbol fields below are
# null until the operator captures them from a live FTMO demo account.
#
# Sources researched 2026-05-03:
#   - ftmo.com/en/symbols/                        (instrument coverage)
#   - ftmo.com/en/blog/drawdowns/                 (DD semantics, AUTHORITATIVE)
#   - ftmo.com/au/trading-objectives/             (rules per program)
#   - ftmo.com/en/faq/can-i-trade-news/           (news restrictions)
#   - ftmo.com/au/faq/how-does-the-best-day-rule-50-work-in-ftmo-challenge-1-step/
#   - ftmo.com/en/faq/which-instruments-can-i-trade-and-what-strategies-am-i-allowed-to-use/
#   - ftmo.com/en/blog/ftmo-enhances-crypto-trading-new-instruments-and-better-spreads/
# =====================================================================

# Firm-level metadata
firm:
  name: "FTMO"
  account_server: null              # populate from demo (e.g. "FTMO-Demo2", "FTMO-Server")
  account_id: null
  mt5_hedge_mode: true              # FTMO EU/AU = hedging; FTMO US = netting/FIFO
  base_currency: "USD"              # also: EUR, GBP, AUD, CAD, CHF, CZK
  server_timezone: "Europe/Prague"  # GMT+2 / GMT+3 DST
  daily_dd_reset: "00:00 CE(S)T"

# Program-level rules (informational; consumed by prop_firm_simulator factories)
programs:
  ftmo_2step:
    daily_loss_pct: 0.05
    max_loss_pct: 0.10
    max_loss_type: "static"          # from starting balance
    profit_target_phase1: 0.10
    profit_target_phase2: 0.05       # Verification
    min_trading_days_phase1: 4
    min_trading_days_phase2: 4
    mandatory_stop_loss: false
    best_day_rule_pct: null          # NOT applicable to 2-Step
    leverage: 100
    news_restrictions: true          # only on funded phase
  ftmo_1step:
    daily_loss_pct: 0.03
    max_loss_pct: 0.10
    max_loss_type: "trailing"        # end-of-day balance trailing, up only
    profit_target: 0.10
    min_trading_days: null           # none (theoretical 2 days at 50/50)
    mandatory_stop_loss: false
    best_day_rule_pct: 0.50          # Best Day <= 50% of Positive Days' Profit
    leverage: 100
    news_restrictions: true
  ftmo_swing:
    leverage: 30
    news_restrictions: false
    weekend_holding: true
    overrides: "applied on top of 1-Step or 2-Step rules"

# Markets NOT available on FTMO (verified: FTMO offers all common CFDs;
# instrument coverage is broader than The5ers — RUS2K, NG, bonds available).
excluded_markets: []

