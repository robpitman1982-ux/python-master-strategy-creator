instrument_universe: cfd_dukascopy
price_source: dukascopy
sweep:
  name: es_all_tf_cfd
  output_dir: Outputs
datasets:
- path: Data/ES_5m_dukascopy.csv
  market: ES
  timeframe: 5m
- path: Data/ES_15m_dukascopy.csv
  market: ES
  timeframe: 15m
- path: Data/ES_30m_dukascopy.csv
  market: ES
  timeframe: 30m
- path: Data/ES_60m_dukascopy.csv
  market: ES
  timeframe: 60m
- path: Data/ES_daily_dukascopy.csv
  market: ES
  timeframe: daily
strategy_types: all
engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 0
  slippage_ticks: 1
  tick_value: 0.01
  dollars_per_point: 1.0
  use_vectorized_trades: true
pipeline:
  max_workers_sweep: 36
  max_workers_refinement: 36
  max_candidates_to_refine: 5
  oos_split_date: '2020-01-01'
  skip_portfolio_evaluation: true
  skip_portfolio_selector: true
promotion_gate:
  min_profit_factor: 1.0
  min_average_trade: 0.0
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20
leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.0
  min_oos_pf: 1.0
  min_total_trades: 60
