sweep:
  name: btc_all_tf_cfd
  output_dir: Outputs
datasets:
- path: Data/BTC_5m_2017_2026_dukascopy.csv
  market: BTC
  timeframe: 5m
- path: Data/BTC_15m_2017_2026_dukascopy.csv
  market: BTC
  timeframe: 15m
- path: Data/BTC_30m_2017_2026_dukascopy.csv
  market: BTC
  timeframe: 30m
- path: Data/BTC_60m_2017_2026_dukascopy.csv
  market: BTC
  timeframe: 60m
- path: Data/BTC_daily_2017_2026_dukascopy.csv
  market: BTC
  timeframe: daily
strategy_types: all
engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 0
  slippage_ticks: 0
  tick_value: 25.0
  dollars_per_point: 5.0
  use_vectorized_trades: true
pipeline:
  max_workers_sweep: 36
  max_workers_refinement: 36
  max_candidates_to_refine: 5
  oos_split_date: '2021-01-01'
  skip_portfolio_evaluation: true
  skip_portfolio_selector: true
promotion_gate:
  min_profit_factor: 1.0
  min_average_trade: 0.0
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20
leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.0
  min_oos_pf: 1.0
  min_total_trades: 60
