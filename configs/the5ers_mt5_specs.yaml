# The5ers MT5 Per-Symbol Cost Overlay
# =====================================================================
# Canonical, firm-specific cost data for The5ers (FivePercentOnline).
# Selector reads this overlay first; falls back to configs/cfd_markets.yaml.
#
# Sources consolidated:
#   - archive/sessions/SESSION_HANDOVER_swap_discovery.md (swap rates, 7 Apr 2026)
#   - modules/cfd_mapping.py (contract specs, account 26213568, 1 Apr 2026)
#   - docs/the5ers_program_rules.md (verified 30 Apr 2026)
#
# Verified against: account 26213568, server FivePercentOnline-Real
# Last verified: 2026-04-07 (swap), 2026-04-01 (contract), 2026-04-30 (rules)
#
# Key conventions:
#   - swap_long_per_micro / swap_short_per_micro are USD per micro per night
#   - "micro" here = 1/10 of full futures contract (matches selector micro_weight = 0.1)
#   - triple_day = weekday whose swap is multiplied by triple_multiplier
#     (e.g. holding overnight Wed->Thu but weekend rollover charged on Fri)
#   - "Points" swap type already converted to USD via:
#       USD_per_micro = swap_points * cfd_contract_size * 10^(-cfd_digits) / 100
#   - "USD" swap type (BTC) is direct USD per lot, divided by 100 for micro
# =====================================================================

# Firm-level metadata
firm:
  name: "The5ers"
  account_server: "FivePercentOnline-Real"
  account_id: 26213568
  mt5_hedge_mode: true
  base_currency: "USD"

# Markets NOT available on The5ers MT5 (Symbol Watch confirmed)
# These should be excluded by the selector at hard-filter time.
excluded_markets:
  - W      # Wheat - no symbol
  - NG     # Natural Gas - no symbol
  - US     # US Bonds - no symbol
  - TY     # Treasury Notes - no symbol
  - RTY    # Russell 2000 - no symbol
  - HG     # Copper - no symbol

