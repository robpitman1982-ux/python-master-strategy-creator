# ============================================================
# Master Strategy Engine Configuration
# ============================================================

# --- Data source ---
datasets:
  - path: "Data/ES_60m_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "60m"

# Which strategy families to run ("all" or list specific names)
strategy_types: "mean_reversion"

# --- Engine defaults ---
engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 4
  tick_value: 12.50
  dollars_per_point: 50.0
  use_vectorized_trades: true

  # Sprint 94: per-filter mask cache. When enabled, the per-filter `mask()`
  # call is memoised process-locally during a sweep so the same filter+params
  # combination only computes once instead of once per combo.
  # Default OFF until the verdict gate locks in. Override via env var
  # PSC_FILTER_MASK_CACHE=1 (or 0) for ad-hoc testing.
  filter_mask_cache:
    enabled: false

# --- Pipeline controls ---
# Local (many cores): max_workers_sweep: 10, max_workers_refinement: 10
# Cloud 2-core droplet: set both to 2
pipeline:
  max_workers_sweep: 2
  max_workers_refinement: 2
  max_candidates_to_refine: 3
  oos_split_date: "2019-01-01"
  skip_portfolio_evaluation: false
  skip_portfolio_selector: true
  portfolio_selector:
    prop_firm_program: "high_stakes"  # bootcamp | high_stakes | hyper_growth | pro_growth
    prop_firm_target: 100000      # Account size target ($100K for High Stakes)
    prefer_gated_leaderboard: true  # Sprint 84+85: gate is now functional, prefer real signal
    min_pass_rate: 0.40        # Minimum acceptable 3-step pass rate
    candidate_cap: 60          # Max candidates after hard filter
    oos_pf_threshold: 1.0      # Hard filter OOS PF minimum
    n_sims_mc: 10000           # MC simulations for main sweep
    n_sims_sizing: 1000        # MC simulations for sizing optimizer
    n_min: 3                   # Minimum portfolio size (allow lean 3-strategy portfolios)
    n_max: 8                   # Maximum portfolio size
    quality_flags: ["ROBUST", "ROBUST_BORDERLINE", "STABLE"]  # Quality flags for candidate filter
    max_combinations: 10000000000  # 10 billion — brute force everything
    # Multi-layer correlation thresholds (loosened — defaults were rejecting everything)
    active_corr_threshold: 0.60    # Active-day correlation max (was 0.50)
    dd_corr_threshold: 0.80       # DD-state correlation max (was 0.40 — way too tight)
    tail_coloss_threshold: 1.01   # DISABLED — tail co-loss calc is broken
    use_ecd: false                # Disable ECD gate (also rejecting everything)
    use_multi_layer_correlation: true
    use_regime_gate: true
    # Sprint 87: per-firm cost overlay. When true, cost-aware MC reads
    # asymmetric long/short swap, custom triple-day rules (e.g. CL Friday=10x,
    # BTC daily), and round-trip commission from configs/the5ers_mt5_specs.yaml.
    # Default false to allow A/B comparison before flipping for a real run.
    use_the5ers_overlay: false
    dd_p95_limit_pct: 0.90        # was 0.70 — too conservative, forced all weights to minimum
    dd_p99_limit_pct: 0.95        # was 0.90
    max_strategies_per_market: 3  # was 2 — allow more per market in larger portfolios
    max_equity_index_strategies: 5  # was 3 — too tight for k=5+ portfolios

# --- Promotion gate (global defaults, strategy types can override) ---
promotion_gate:
  min_profit_factor: 1.00
  min_average_trade: 0.00
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20

# --- Final leaderboard acceptance ---
leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 60

# --- Output ---
output_dir: "Outputs"
