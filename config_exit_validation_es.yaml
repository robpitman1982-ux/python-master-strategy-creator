# Focused ES exit-validation sweep.
# Purpose: compare Session 28 exit styles on real datasets without running the full multi-timeframe cloud search.

datasets:
  - path: "ES_60m_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "60m"
  - path: "ES_30m_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "30m"

strategy_types: "all"

engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 4
  tick_value: 12.50
  dollars_per_point: 50.0

pipeline:
  max_workers_sweep: 2
  max_workers_refinement: 2
  max_candidates_to_refine: 1
  oos_split_date: "2019-01-01"

promotion_gate:
  min_profit_factor: 1.00
  min_average_trade: 0.00
  require_positive_net_pnl: false
  min_trades: 40
  min_trades_per_year: 3.0
  max_promoted_candidates: 5

leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 50

output_dir: "Outputs"
