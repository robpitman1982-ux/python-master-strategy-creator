# NQ (E-mini Nasdaq) — Session 54 test run: daily + 60m only
# $20/point, $5.00/tick (tick = 0.25)
datasets:
  - path: "Data/NQ_daily_2008_2026_tradestation.csv"
    market: "NQ"
    timeframe: "daily"
  - path: "Data/NQ_60m_2008_2026_tradestation.csv"
    market: "NQ"
    timeframe: "60m"
strategy_types: "all"
engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 4
  tick_value: 5.0
  dollars_per_point: 20.0
pipeline:
  skip_portfolio_evaluation: false
  skip_portfolio_selector: true
  max_workers_sweep: 6
  max_workers_refinement: 6
  max_candidates_to_refine: 3
  oos_split_date: "2019-01-01"
promotion_gate:
  min_profit_factor: 1.00
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20
leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 60
output_dir: "Outputs"