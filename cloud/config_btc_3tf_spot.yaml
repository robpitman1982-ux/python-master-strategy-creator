# BTC (Bitcoin, CME) 3-timeframe SPOT sweep
# $5 per point, tick size 5.0, $25.00/tick
# Shorter history (CME BTC futures started Dec 2017)
# OOS split at 2021-01-01 (3yr IS, ~5yr OOS)

datasets:
  - path: "Data/BTC_daily_2008_2026_tradestation.csv"
    market: "BTC"
    timeframe: "daily"
  - path: "Data/BTC_60m_2008_2026_tradestation.csv"
    market: "BTC"
    timeframe: "60m"
  - path: "Data/BTC_30m_2008_2026_tradestation.csv"
    market: "BTC"
    timeframe: "30m"

strategy_types: "all"

engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 2
  tick_value: 25.0
  dollars_per_point: 5.0

pipeline:
  skip_portfolio_evaluation: true
  max_workers_sweep: 94
  max_workers_refinement: 94
  max_candidates_to_refine: 5
  oos_split_date: "2021-01-01"

promotion_gate:
  min_profit_factor: 1.00
  min_average_trade: 0.00
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20

leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 60

output_dir: "Outputs"

cloud:
  machine_type: "n2-highcpu-96"
  zone: "us-central1-f"
  provisioning_model: "SPOT"
