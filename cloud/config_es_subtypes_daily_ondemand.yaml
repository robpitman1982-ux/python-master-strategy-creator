# config_es_subtypes_daily_ondemand.yaml
# Validation run: 9 strategy subtypes on ES daily only
# Estimated runtime: ~8-12 minutes (daily data + subtypes ~180 combos each vs 500+ for originals)
# Estimated cost: ~$0.70 on-demand

datasets:
  - path: "Data/ES_daily_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "daily"

strategy_types:
  - mean_reversion_vol_dip
  - mean_reversion_mom_exhaustion
  - mean_reversion_trend_pullback
  - trend_pullback_continuation
  - trend_momentum_breakout
  - trend_slope_recovery
  - breakout_compression_squeeze
  - breakout_range_expansion
  - breakout_higher_low_structure

engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 4
  tick_value: 12.50
  dollars_per_point: 50.0

pipeline:
  skip_portfolio_evaluation: true
  max_workers_sweep: 94
  max_workers_refinement: 94
  max_candidates_to_refine: 5
  oos_split_date: "2019-01-01"
  max_memory_gb: 80

promotion_gate:
  min_profit_factor: 1.00
  min_average_trade: 0.00
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20

leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 60

output_dir: "Outputs"

cloud:
  zone: "us-central1-a"
  machine_type: "n2-highcpu-96"
  provisioning_model: "STANDARD"
  boot_disk_size: "120GB"
  image_family: "ubuntu-2404-lts-amd64"
