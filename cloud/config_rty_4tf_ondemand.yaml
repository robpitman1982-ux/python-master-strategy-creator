# RTY (E-mini Russell 2000) 4-timeframe sweep
# $50/point, $5.00/tick (tick = 0.10)

datasets:
  - path: "Data/RTY_daily_2008_2026_tradestation.csv"
    market: "RTY"
    timeframe: "daily"
  - path: "Data/RTY_60m_2008_2026_tradestation.csv"
    market: "RTY"
    timeframe: "60m"
  - path: "Data/RTY_30m_2008_2026_tradestation.csv"
    market: "RTY"
    timeframe: "30m"
  - path: "Data/RTY_15m_2008_2026_tradestation.csv"
    market: "RTY"
    timeframe: "15m"

strategy_types: "all"
engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 4
  tick_value: 5.0
  dollars_per_point: 50.0
pipeline:
  skip_portfolio_evaluation: true
  max_workers_sweep: 90
  max_workers_refinement: 90
  max_candidates_to_refine: 3
  oos_split_date: "2019-01-01"
promotion_gate:
  min_profit_factor: 1.00
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20
leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 60
output_dir: "Outputs"
cloud:
  machine_type: "n2-highcpu-96"
  zone: "us-central1-c"
  provisioning_model: "STANDARD"
