# CL sweep — 5 timeframes × 3 families on GCP n2-highcpu-96 SPOT in us-central1-c
# Datasets: daily, 60m, 30m, 15m, 5m
# Estimated runtime: ~40 minutes (vectorised + initializer pattern)
# Estimated cost: ~$0.45 USD SPOT (preemption possible — relaunch if needed)
# CL contract specs: $1000/point, $10/tick (0.01 point), ~2 tick slippage

datasets:
  - path: "Data/CL_daily_2008_2026_tradestation.csv"
    market: "CL"
    timeframe: "daily"
  - path: "Data/CL_60m_2008_2026_tradestation.csv"
    market: "CL"
    timeframe: "60m"
  - path: "Data/CL_30m_2008_2026_tradestation.csv"
    market: "CL"
    timeframe: "30m"
  - path: "Data/CL_15m_2008_2026_tradestation.csv"
    market: "CL"
    timeframe: "15m"
  - path: "Data/CL_5m_2008_2026_tradestation.csv"
    market: "CL"
    timeframe: "5m"

strategy_types: "all"

engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 2
  tick_value: 10.0
  dollars_per_point: 1000.0

pipeline:
  max_workers_sweep: 94
  max_workers_refinement: 94
  max_candidates_to_refine: 5
  oos_split_date: "2019-01-01"
  max_memory_gb: 80

promotion_gate:
  min_profit_factor: 1.00
  min_average_trade: 0.00
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20

leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 60

output_dir: "Outputs"

cloud:
  zone: "us-central1-c"
  machine_type: "n2-highcpu-96"
  provisioning_model: "SPOT"
  boot_disk_size: "120GB"
  image_family: "ubuntu-2404-lts-amd64"
