# config_es_shorts_daily_ondemand.yaml
# Validation run: 3 short strategy types on ES daily only
# Estimated runtime: ~5-8 minutes
# Estimated cost: ~$0.50 on-demand

datasets:
  - path: "Data/ES_daily_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "daily"

strategy_types:
  - short_mean_reversion
  - short_trend
  - short_breakout

engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 4
  tick_value: 12.50
  dollars_per_point: 50.0

pipeline:
  max_workers_sweep: 8
  max_workers_refinement: 8
  max_candidates_to_refine: 5
  oos_split_date: "2019-01-01"
  max_memory_gb: 8

promotion_gate:
  min_profit_factor: 1.00
  min_average_trade: 0.00
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20

leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 60

output_dir: "Outputs"

cloud:
  zone: "us-central1-a"
  machine_type: "e2-standard-8"
  provisioning_model: "STANDARD"
  boot_disk_size: "60GB"
  image_family: "ubuntu-2404-lts-amd64"
  instance_name: "strategy-sweep-shorts-daily"
