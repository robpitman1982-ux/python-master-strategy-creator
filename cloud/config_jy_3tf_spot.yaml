# JY (Japanese Yen) 3-timeframe SPOT sweep
# $125,000 per point, tick size 0.0000005, $6.25/tick

datasets:
  - path: "Data/JY_daily_2008_2026_tradestation.csv"
    market: "JY"
    timeframe: "daily"
  - path: "Data/JY_60m_2008_2026_tradestation.csv"
    market: "JY"
    timeframe: "60m"
  - path: "Data/JY_30m_2008_2026_tradestation.csv"
    market: "JY"
    timeframe: "30m"

strategy_types: "all"

engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 2
  tick_value: 6.25
  dollars_per_point: 125000.0

pipeline:
  skip_portfolio_evaluation: true
  max_workers_sweep: 94
  max_workers_refinement: 94
  max_candidates_to_refine: 5
  oos_split_date: "2019-01-01"

promotion_gate:
  min_profit_factor: 1.00
  min_average_trade: 0.00
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20

leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 60

output_dir: "Outputs"

cloud:
  machine_type: "n2-highcpu-96"
  zone: "us-central1-f"
  provisioning_model: "SPOT"
