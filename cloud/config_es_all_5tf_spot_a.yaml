# Full ES sweep — 5 timeframes × 3 families on GCP n2-highcpu-96 SPOT in us-central1-a
# Datasets: daily (4.5K bars), 60m (107K), 30m (215K), 15m (430K), 5m (1.3M)
# Estimated runtime: ~40 minutes (vectorised + initializer pattern)
# Estimated cost: ~$0.45 USD SPOT (preemption possible — relaunch if needed)
# NOTE: 5m data file must be present on strategy-console uploads folder (not in git)

datasets:
  - path: "Data/ES_daily_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "daily"
  - path: "Data/ES_60m_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "60m"
  - path: "Data/ES_30m_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "30m"
  - path: "Data/ES_15m_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "15m"
  - path: "Data/ES_5m_2008_2026_tradestation.csv"
    market: "ES"
    timeframe: "5m"

strategy_types: "all"

engine:
  initial_capital: 250000.0
  risk_per_trade: 0.01
  commission_per_contract: 2.00
  slippage_ticks: 4
  tick_value: 12.50
  dollars_per_point: 50.0

pipeline:
  max_workers_sweep: 94
  max_workers_refinement: 94
  max_candidates_to_refine: 5
  oos_split_date: "2019-01-01"
  max_memory_gb: 80

promotion_gate:
  min_profit_factor: 1.00
  min_average_trade: 0.00
  require_positive_net_pnl: false
  min_trades: 50
  min_trades_per_year: 3.0
  max_promoted_candidates: 20

leaderboard:
  min_net_pnl: 0.0
  min_pf: 1.00
  min_oos_pf: 1.00
  min_total_trades: 60

output_dir: "Outputs"

cloud:
  zone: "us-central1-a"
  machine_type: "n2-highcpu-96"
  provisioning_model: "SPOT"
  boot_disk_size: "120GB"
  image_family: "ubuntu-2404-lts-amd64"
